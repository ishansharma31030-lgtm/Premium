<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-[#050505]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/globals.css">
</head>
<body class="antialiased flex items-center justify-center min-h-screen overflow-hidden">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-red-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="relative z-10 text-center px-6">
        <h1 class="text-[12rem] font-black text-white opacity-5 select-none leading-none">404</h1>
        
        <div class="gsap-reveal -mt-20">
            <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-6">Lost in the <span class="text-accent">Cloud?</span></h2>
            <p class="text-gray-400 max-w-md mx-auto mb-10 text-lg leading-relaxed">
                The page you are looking for has been moved, deleted, or never existed in the first place. Let's get you back to the sync.
            </p>
            
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="index.html" class="bg-white text-black px-8 py-3 rounded-full font-bold hover:shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all">
                    Return Home
                </a>
                <a href="documentation.html" class="premium-glass border border-gray-700 px-8 py-3 rounded-full font-bold text-white hover:bg-white/5 transition-all">
                    View Docs
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
 <script src="js/main.js"></script>
    <script src="js/animations.js"></script>
</body>
